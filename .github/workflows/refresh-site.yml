name: Refresh Static Site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"
  push:
    branches: [main]

concurrency:
  group: refresh-static-site
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BITBO_API_KEY: ${{ secrets.BITBO_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -q

      - name: Refresh data and reports
        run: uv run scripts/update_daily.py

      - name: Build static site
        run: uv run scripts/build_static_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload private static site artifact
        uses: actions/upload-artifact@v6
        with:
          name: btcfloor-static-site-${{ github.run_number }}
          path: dist/site
          if-no-files-found: error
          retention-days: 14

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
